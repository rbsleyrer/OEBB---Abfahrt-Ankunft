<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fahrplan">
<meta name="theme-color" content="#0a0a0f">
<title>Fahrplan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--panel:#111118;--border:#1e1e2e;--accent:#e8003d;
    --text:#f0f0f8;--muted:#5a5a7a;--green:#00e5a0;--yellow:#ffd600;--red:#ff3d5a;
    --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);}
  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:#111118;border-bottom:1px solid #1e1e2e;flex-shrink:0;}
  .logo{font-family:var(--display);font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px;}
  .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:blink 1.4s ease-in-out infinite;}
  .clock{font-size:14px;letter-spacing:2px;}
  .mode-bar{display:flex;gap:8px;padding:10px 16px;background:#0d0d14;border-bottom:1px solid #1e1e2e;flex-shrink:0;}
  .mode-btn{flex:1;padding:9px 4px;background:rgba(255,255,255,0.03);border:1px solid #1e1e2e;border-radius:8px;color:#5a5a7a;font-family:var(--mono);font-size:11px;letter-spacing:1px;cursor:pointer;}
  .mode-btn.active{background:rgba(232,0,61,0.15);border-color:rgba(232,0,61,0.4);color:#ff6680;}
  .tabs{display:flex;background:#0d0d14;border-bottom:1px solid #1e1e2e;flex-shrink:0;}
  .tab{flex:1;padding:13px 8px;background:none;border:none;border-bottom:2px solid transparent;color:#5a5a7a;font-family:var(--mono);font-size:12px;letter-spacing:1px;cursor:pointer;}
  .tab.active{border-bottom-color:var(--accent);color:var(--text);}
  .col-header{display:flex;padding:6px 16px;font-size:9px;letter-spacing:2px;color:#5a5a7a;border-bottom:1px solid #1e1e2e;text-transform:uppercase;flex-shrink:0;}
  .list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .train-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid rgba(30,30,46,0.6);gap:12px;}
  .time{font-size:20px;font-weight:500;min-width:58px;}
  .info{flex:1;min-width:0;}
  .dest{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px;}
  .train-line{display:flex;align-items:center;gap:6px;}
  .badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;flex-shrink:0;}
  .train-name{font-size:11px;color:#5a5a7a;}
  .status{font-size:12px;font-weight:500;text-align:right;min-width:60px;}
  .plat span{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);width:32px;height:26px;border-radius:5px;font-size:12px;}
  .footer{padding:7px 16px;font-size:10px;color:#3a3a5a;border-top:1px solid #1e1e2e;flex-shrink:0;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo"><div class="dot"></div>OeBB FAHRPLAN</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-dep" onclick="setMode('dep')">&#8593; ABFAHRT</button>
    <button class="mode-btn" id="btn-arr" onclick="setMode('arr')">&#8595; ANKUNFT</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-sbg" onclick="setStation('sbg')">Salzburg Hbf</button>
    <button class="tab" id="tab-vie" onclick="setStation('vie')">Wien Westbhf</button>
  </div>
  <div class="col-header">
    <div style="min-width:58px" id="col-time">ABFAHRT</div>
    <div style="flex:1;padding-left:8px" id="col-dest">ZIEL</div>
    <div style="min-width:60px;text-align:right">STATUS</div>
    <div style="width:32px;text-align:center;margin-left:12px">GL.</div>
  </div>
  <div class="list" id="list"></div>
  <div class="footer" id="footer">OeBB &amp; Westbahn</div>
</div>
<script>
var BS={
  rj:{bg:'rgba(232,0,61,0.2)',c:'#ff6680'},
  ice:{bg:'rgba(255,255,255,0.1)',c:'#dddddd'},
  ic:{bg:'rgba(255,107,53,0.2)',c:'#ff6b35'},
  s:{bg:'rgba(0,229,160,0.15)',c:'#00e5a0'},
  rex:{bg:'rgba(100,100,200,0.2)',c:'#9999dd'},
  wb:{bg:'rgba(240,190,0,0.2)',c:'#ffd600'}
};
var DATA={
  sbg:{
    dep:[
      {d:'Wien Westbahnhof',t:'WB 110',y:'wb',p:'2'},
      {d:'Wien Hbf',t:'RJ 160',y:'rj',p:'1'},
      {d:'Muenchen Hbf',t:'RJ 61',y:'rj',p:'3'},
      {d:'Wien Westbahnhof',t:'WB 112',y:'wb',p:'2'},
      {d:'Innsbruck Hbf',t:'ICE 28',y:'ice',p:'4'},
      {d:'Wien Hbf',t:'RJ 162',y:'rj',p:'1'},
      {d:'Zuerich HB',t:'EC 163',y:'ic',p:'5'},
      {d:'Wien Westbahnhof',t:'WB 114',y:'wb',p:'2'},
      {d:'Graz Hbf',t:'RJ 635',y:'rj',p:'1'},
      {d:'Budapest Keleti',t:'RJ 63',y:'rj',p:'3'},
      {d:'Freilassing',t:'S 1',y:'s',p:'7'},
      {d:'Wien Westbahnhof',t:'WB 116',y:'wb',p:'2'},
      {d:'Klagenfurt Hbf',t:'EC 113',y:'ic',p:'4'},
      {d:'Wien Hbf',t:'RJ 164',y:'rj',p:'1'}
    ],
    arr:[
      {d:'Wien Westbahnhof',t:'WB 111',y:'wb',p:'2'},
      {d:'Wien Hbf',t:'RJ 161',y:'rj',p:'1'},
      {d:'Muenchen Hbf',t:'RJ 60',y:'rj',p:'3'},
      {d:'Wien Westbahnhof',t:'WB 113',y:'wb',p:'2'},
      {d:'Innsbruck Hbf',t:'ICE 27',y:'ice',p:'4'},
      {d:'Zuerich HB',t:'EC 162',y:'ic',p:'5'},
      {d:'Wien Westbahnhof',t:'WB 115',y:'wb',p:'2'},
      {d:'Frankfurt Hbf',t:'ICE 26',y:'ice',p:'4'},
      {d:'Graz Hbf',t:'RJ 634',y:'rj',p:'1'},
      {d:'Budapest Keleti',t:'RJ 62',y:'rj',p:'3'},
      {d:'Wien Westbahnhof',t:'WB 117',y:'wb',p:'2'},
      {d:'Klagenfurt Hbf',t:'EC 112',y:'ic',p:'4'},
      {d:'Praha hl.n.',t:'RJ 74',y:'rj',p:'2'},
      {d:'Freilassing',t:'S 1',y:'s',p:'7'}
    ]
  },
  vie:{
    dep:[
      {d:'Salzburg Hbf',t:'WB 111',y:'wb',p:'4'},
      {d:'Salzburg Hbf',t:'RJ 761',y:'rj',p:'6'},
      {d:'St. Poelten Hbf',t:'S 50',y:'s',p:'1'},
      {d:'Salzburg Hbf',t:'WB 113',y:'wb',p:'4'},
      {d:'Innsbruck Hbf',t:'RJ 163',y:'rj',p:'3'},
      {d:'Salzburg Hbf',t:'RJ 763',y:'rj',p:'6'},
      {d:'Zuerich HB',t:'RJ 165',y:'rj',p:'5'},
      {d:'Salzburg Hbf',t:'WB 115',y:'wb',p:'4'},
      {d:'Muenchen Hbf',t:'RJ 63',y:'rj',p:'6'},
      {d:'St. Poelten Hbf',t:'S 50',y:'s',p:'2'},
      {d:'Salzburg Hbf',t:'WB 117',y:'wb',p:'4'},
      {d:'Bregenz',t:'RJ 167',y:'rj',p:'3'},
      {d:'Salzburg Hbf',t:'RJ 765',y:'rj',p:'6'},
      {d:'Feldkirch',t:'IC 690',y:'ic',p:'5'}
    ],
    arr:[
      {d:'Salzburg Hbf',t:'WB 110',y:'wb',p:'4'},
      {d:'Salzburg Hbf',t:'RJ 760',y:'rj',p:'6'},
      {d:'St. Poelten Hbf',t:'S 50',y:'s',p:'1'},
      {d:'Salzburg Hbf',t:'WB 112',y:'wb',p:'4'},
      {d:'Muenchen Hbf',t:'RJ 62',y:'rj',p:'6'},
      {d:'Innsbruck Hbf',t:'RJ 162',y:'rj',p:'3'},
      {d:'Salzburg Hbf',t:'WB 114',y:'wb',p:'4'},
      {d:'Zuerich HB',t:'RJ 164',y:'rj',p:'5'},
      {d:'Salzburg Hbf',t:'RJ 762',y:'rj',p:'6'},
      {d:'Bregenz',t:'RJ 166',y:'rj',p:'3'},
      {d:'Salzburg Hbf',t:'WB 116',y:'wb',p:'4'},
      {d:'Frankfurt Hbf',t:'ICE 26',y:'ice',p:'7'},
      {d:'Budapest Keleti',t:'RJ 68',y:'rj',p:'5'},
      {d:'Praha hl.n.',t:'RJ 74',y:'rj',p:'6'}
    ]
  }
};

var station=‘sbg’, mode=‘dep’;

function pad(n){return n<10?‘0’+n:’’+n;}
function ftime(ms){var d=new Date(ms);return pad(d.getHours())+’:’+pad(d.getMinutes());}

function tick(){
var d=new Date();
document.getElementById(‘clock’).textContent=pad(d.getHours())+’:’+pad(d.getMinutes())+’:’+pad(d.getSeconds());
}
setInterval(tick,1000);tick();

function render(){
var entries=DATA[station][mode];
var t=Date.now()+(1+Math.random()*2)*60000;
var html=’’;
for(var i=0;i<entries.length;i++){
if(i>0)t+=(4+Math.random()*9)*60000;
var e=entries[i];
var bs=BS[e.y]||BS.rex;
var delay=Math.random()<0.16?Math.ceil(Math.random()*12):0;
var sc=’#00e5a0’,st=‘punktl.’;
if(delay>0&&delay<5){sc=’#ffd600’;st=’+’+delay+’ min’;}
if(delay>=5){sc=’#ff3d5a’;st=’+’+delay+’ min’;}
var tl=e.y===‘wb’?‘WB’:e.t.split(’ ‘)[0];
html+=’<div class="train-row">’;
html+=’<div class="time">’+ftime(t)+’</div>’;
html+=’<div class="info"><div class="dest">’+e.d+’</div>’;
html+=’<div class="train-line"><span class="badge" style="background:'+bs.bg+';color:'+bs.c+'">’+tl+’</span>’;
html+=’<span class="train-name">’+e.t+’</span></div></div>’;
html+=’<div class="status" style="color:'+sc+'">’+st+’</div>’;
html+=’<div class="plat"><span>’+e.p+’</span></div>’;
html+=’</div>’;
}
document.getElementById(‘list’).innerHTML=html;
var n=new Date();
document.getElementById(‘footer’).textContent=pad(n.getHours())+’:’+pad(n.getMinutes())+’ Uhr - OeBB & Westbahn’;
}

function setStation(k){
station=k;
var tabs=document.querySelectorAll(’.tab’);
for(var i=0;i<tabs.length;i++)tabs[i].classList.remove(‘active’);
document.getElementById(‘tab-’+k).classList.add(‘active’);
render();
}
function setMode(m){
mode=m;
var btns=document.querySelectorAll(’.mode-btn’);
for(var i=0;i<btns.length;i++)btns[i].classList.remove(‘active’);
document.getElementById(‘btn-’+m).classList.add(‘active’);
document.getElementById(‘col-time’).textContent=m===‘dep’?‘ABFAHRT’:‘ANKUNFT’;
document.getElementById(‘col-dest’).textContent=m===‘dep’?‘ZIEL’:‘HERKUNFT’;
render();
}

render();
setInterval(render,60000);
</script>

</body>
</html>
