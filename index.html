<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ÖBB">
<meta name="theme-color" content="#0a0a0f">
<title>ÖBB Fahrplan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #e8003d;
    --text: #f0f0f8;
    --muted: #5a5a7a;
    --green: #00e5a0;
    --yellow: #ffd600;
    --red: #ff3d5a;
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
overflow: hidden;
}

#app {
display: flex;
flex-direction: column;
height: 100vh;
height: 100dvh;
padding-top: env(safe-area-inset-top, 0px);
padding-bottom: env(safe-area-inset-bottom, 0px);
}

/* HEADER */
.header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 20px;
background: var(–panel);
border-bottom: 1px solid var(–border);
flex-shrink: 0;
}

.logo {
font-family: ‘Syne’, sans-serif;
font-size: 20px;
font-weight: 800;
letter-spacing: -0.5px;
display: flex;
align-items: center;
gap: 10px;
}

.dot {
width: 9px; height: 9px;
background: var(–accent);
border-radius: 50%;
animation: blink 1.4s ease-in-out infinite;
flex-shrink: 0;
}

.clock {
font-size: 16px;
letter-spacing: 2px;
font-variant-numeric: tabular-nums;
color: var(–text);
}

/* MODE TOGGLE */
.mode-bar {
display: flex;
gap: 8px;
padding: 10px 16px;
background: #0d0d14;
border-bottom: 1px solid var(–border);
flex-shrink: 0;
}

.mode-btn {
flex: 1;
padding: 9px 4px;
background: rgba(255,255,255,0.03);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 12px;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.2s;
}

.mode-btn.active {
background: rgba(232, 0, 61, 0.15);
border-color: rgba(232, 0, 61, 0.4);
color: #ff6680;
}

/* STATION TABS */
.tabs {
display: flex;
background: #0d0d14;
border-bottom: 1px solid var(–border);
flex-shrink: 0;
}

.tab {
flex: 1;
padding: 13px 8px;
background: none;
border: none;
border-bottom: 2px solid transparent;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 12px;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.2s;
}

.tab.active {
border-bottom-color: var(–accent);
color: var(–text);
font-weight: 500;
}

/* COL HEADERS */
.col-header {
display: flex;
padding: 7px 16px;
font-size: 9px;
letter-spacing: 2px;
color: var(–muted);
border-bottom: 1px solid var(–border);
text-transform: uppercase;
flex-shrink: 0;
background: rgba(255,255,255,0.01);
}

/* LIST */
.list {
flex: 1;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}

.list::-webkit-scrollbar { width: 2px; }
.list::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

/* TRAIN ROW */
.train-row {
display: flex;
align-items: center;
padding: 13px 16px;
border-bottom: 1px solid rgba(30, 30, 46, 0.7);
gap: 12px;
transition: background 0.15s;
}

.train-row:active { background: rgba(255,255,255,0.025); }

.time {
font-size: 20px;
font-weight: 500;
min-width: 58px;
letter-spacing: 0.5px;
font-variant-numeric: tabular-nums;
color: var(–text);
}

.info { flex: 1; min-width: 0; }

.dest {
font-size: 15px;
font-weight: 500;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
margin-bottom: 4px;
}

.train-line {
display: flex;
align-items: center;
gap: 6px;
}

.badge {
font-size: 9px;
padding: 2px 7px;
border-radius: 4px;
font-weight: 500;
letter-spacing: 0.5px;
flex-shrink: 0;
}

.train-name {
font-size: 11px;
color: var(–muted);
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}

.status {
font-size: 12px;
text-align: right;
min-width: 62px;
font-weight: 500;
}

.platform span {
display: inline-flex;
align-items: center;
justify-content: center;
background: rgba(255,255,255,0.07);
border: 1px solid rgba(255,255,255,0.1);
width: 34px;
height: 28px;
border-radius: 6px;
font-size: 13px;
font-weight: 500;
}

/* FOOTER */
.footer {
padding: 7px 16px;
font-size: 10px;
color: #2e2e4e;
border-top: 1px solid var(–border);
flex-shrink: 0;
letter-spacing: 0.5px;
display: flex;
justify-content: space-between;
align-items: center;
}

.refresh-indicator {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–green);
animation: pulse 2s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.12} }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
@keyframes fadeUp {
from { opacity: 0; transform: translateY(8px); }
to   { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="dot"></div>
      ÖBB FAHRPLAN
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" id="btn-dep" onclick="setMode('dep')">↑ ABFAHRT</button>
    <button class="mode-btn" id="btn-arr" onclick="setMode('arr')">↓ ANKUNFT</button>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-sbg" onclick="setStation('sbg')">Salzburg Hbf</button>
    <button class="tab" id="tab-vie" onclick="setStation('vie')">Wien Westbhf</button>
  </div>

  <div class="col-header">
    <div style="min-width:58px" id="col-time">ABFAHRT</div>
    <div style="flex:1;padding-left:12px" id="col-dest">ZIEL</div>
    <div style="min-width:62px;text-align:right">STATUS</div>
    <div style="width:34px;text-align:center;margin-left:12px">GL.</div>
  </div>

  <div class="list" id="list"></div>

  <div class="footer">
    <span id="footer-text">Fahrplandaten · ÖBB Österreich</span>
    <div class="refresh-indicator"></div>
  </div>
</div>

<script>
// ─── Data ────────────────────────────────────────────────────────────────────

const DATA = {
  sbg: {
    dep: [
      { dest: 'Wien Hbf',           train: 'RJ 160',    type: 'rj',  plat: '1' },
      { dest: 'München Hbf',        train: 'RJ 61',     type: 'rj',  plat: '3' },
      { dest: 'Innsbruck Hbf',      train: 'ICE 28',    type: 'ice', plat: '4' },
      { dest: 'Linz Hbf',           train: 'RJ 63',     type: 'rj',  plat: '2' },
      { dest: 'Zürich HB',          train: 'EC 163',    type: 'ic',  plat: '5' },
      { dest: 'Graz Hbf',           train: 'RJ 635',    type: 'rj',  plat: '1' },
      { dest: 'Wien Hbf',           train: 'RJ 162',    type: 'rj',  plat: '3' },
      { dest: 'Budapest Keleti',    train: 'RJ 63',     type: 'rj',  plat: '2' },
      { dest: 'Bregenz',            train: 'REX 1860',  type: 'rex', plat: '6' },
      { dest: 'Klagenfurt Hbf',     train: 'EC 113',    type: 'ic',  plat: '4' },
      { dest: 'Freilassing',        train: 'S 1',       type: 's',   plat: '7' },
      { dest: 'Golling-Abtenau',    train: 'S 3',       type: 's',   plat: '8' },
      { dest: 'Wien Hbf',           train: 'RJ 164',    type: 'rj',  plat: '1' },
      { dest: 'Schwarzach-St.Veit', train: 'REX 3810',  type: 'rex', plat: '5' },
      { dest: 'Innsbruck Hbf',      train: 'RJ 765',    type: 'rj',  plat: '3' },
    ],
    arr: [
      { dest: 'Wien Hbf',           train: 'RJ 161',    type: 'rj',  plat: '1' },
      { dest: 'München Hbf',        train: 'RJ 60',     type: 'rj',  plat: '3' },
      { dest: 'Innsbruck Hbf',      train: 'ICE 27',    type: 'ice', plat: '4' },
      { dest: 'Linz Hbf',           train: 'RJ 62',     type: 'rj',  plat: '2' },
      { dest: 'Zürich HB',          train: 'EC 162',    type: 'ic',  plat: '5' },
      { dest: 'Frankfurt Hbf',      train: 'ICE 26',    type: 'ice', plat: '4' },
      { dest: 'Graz Hbf',           train: 'RJ 634',    type: 'rj',  plat: '1' },
      { dest: 'Budapest Keleti',    train: 'RJ 62',     type: 'rj',  plat: '2' },
      { dest: 'Bregenz',            train: 'REX 1861',  type: 'rex', plat: '6' },
      { dest: 'Klagenfurt Hbf',     train: 'EC 112',    type: 'ic',  plat: '4' },
      { dest: 'Freilassing',        train: 'S 1',       type: 's',   plat: '7' },
      { dest: 'Golling-Abtenau',    train: 'S 3',       type: 's',   plat: '8' },
      { dest: 'Hamburg Hbf',        train: 'ICE 25',    type: 'ice', plat: '3' },
      { dest: 'Schwarzach-St.Veit', train: 'REX 3811',  type: 'rex', plat: '5' },
      { dest: 'Praha hl.n.',        train: 'RJ 74',     type: 'rj',  plat: '2' },
    ]
  },
  vie: {
    dep: [
      { dest: 'Salzburg Hbf',       train: 'RJ 761',    type: 'rj',  plat: '4' },
      { dest: 'Innsbruck Hbf',      train: 'RJ 163',    type: 'rj',  plat: '3' },
      { dest: 'St. Pölten Hbf',     train: 'S 50',      type: 's',   plat: '1' },
      { dest: 'Linz Hbf',           train: 'RJ 761',    type: 'rj',  plat: '4' },
      { dest: 'Zürich HB',          train: 'RJ 165',    type: 'rj',  plat: '6' },
      { dest: 'München Hbf',        train: 'RJ 63',     type: 'rj',  plat: '5' },
      { dest: 'Bregenz',            train: 'RJ 167',    type: 'rj',  plat: '3' },
      { dest: 'St. Pölten Hbf',     train: 'S 50',      type: 's',   plat: '2' },
      { dest: 'Salzburg Hbf',       train: 'RJ 763',    type: 'rj',  plat: '4' },
      { dest: 'Amstetten',          train: 'REX 2110',  type: 'rex', plat: '1' },
      { dest: 'Feldkirch',          train: 'IC 690',    type: 'ic',  plat: '6' },
      { dest: 'Wels Hbf',           train: 'REX 2112',  type: 'rex', plat: '2' },
      { dest: 'Innsbruck Hbf',      train: 'RJ 169',    type: 'rj',  plat: '5' },
      { dest: 'St. Pölten Hbf',     train: 'S 50',      type: 's',   plat: '1' },
      { dest: 'Salzburg Hbf',       train: 'ICE 28',    type: 'ice', plat: '7' },
    ],
    arr: [
      { dest: 'Salzburg Hbf',       train: 'RJ 760',    type: 'rj',  plat: '4' },
      { dest: 'Innsbruck Hbf',      train: 'RJ 162',    type: 'rj',  plat: '3' },
      { dest: 'St. Pölten Hbf',     train: 'S 50',      type: 's',   plat: '1' },
      { dest: 'München Hbf',        train: 'RJ 62',     type: 'rj',  plat: '5' },
      { dest: 'Zürich HB',          train: 'RJ 164',    type: 'rj',  plat: '6' },
      { dest: 'Bregenz',            train: 'RJ 166',    type: 'rj',  plat: '3' },
      { dest: 'Linz Hbf',           train: 'RJ 760',    type: 'rj',  plat: '4' },
      { dest: 'Feldkirch',          train: 'IC 691',    type: 'ic',  plat: '6' },
      { dest: 'Salzburg Hbf',       train: 'RJ 762',    type: 'rj',  plat: '4' },
      { dest: 'Amstetten',          train: 'REX 2111',  type: 'rex', plat: '1' },
      { dest: 'Frankfurt Hbf',      train: 'ICE 26',    type: 'ice', plat: '7' },
      { dest: 'Wels Hbf',           train: 'REX 2113',  type: 'rex', plat: '2' },
      { dest: 'Budapest Keleti',    train: 'RJ 68',     type: 'rj',  plat: '5' },
      { dest: 'Praha hl.n.',        train: 'RJ 74',     type: 'rj',  plat: '3' },
      { dest: 'Hamburg Hbf',        train: 'ICE 25',    type: 'ice', plat: '7' },
    ]
  }
};

const BADGE_STYLES = {
  rj:  { bg: 'rgba(232,0,61,0.25)',    color: '#ff6680' },
  ice: { bg: 'rgba(255,255,255,0.12)', color: '#e0e0e0' },
  ic:  { bg: 'rgba(255,107,53,0.25)',  color: '#ff6b35' },
  s:   { bg: 'rgba(0,229,160,0.18)',   color: '#00e5a0' },
  rex: { bg: 'rgba(100,100,200,0.2)',  color: '#9999dd' },
};

// ─── State ───────────────────────────────────────────────
let station = 'sbg';
let mode = 'dep';

// ─── Clock ───────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// ─── Generate timetable from now ─────────────────────────
function generateTimes(entries) {
  const now = new Date();
  let cursor = new Date(now);
  // Start 1-3 min from now
  cursor.setMinutes(cursor.getMinutes() + 1 + Math.floor(Math.random() * 3));

  return entries.map((entry, i) => {
    // Space trains 5-15 min apart
    if (i > 0) cursor = new Date(cursor.getTime() + (5 + Math.floor(Math.random() * 10)) * 60000);
    const delay = Math.random() < 0.18 ? Math.floor(Math.random() * 11) + 1 : 0;
    return {
      ...entry,
      time: cursor.toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit', hour12: false }),
      delay,
    };
  });
}

// ─── Render ──────────────────────────────────────────────
function render() {
  const entries = DATA[station][mode];
  const items = generateTimes(entries);
  const list = document.getElementById('list');

  list.innerHTML = items.map((item, i) => {
    const bs = BADGE_STYLES[item.type] || BADGE_STYLES.rex;
    const typeLabel = item.train.split(' ')[0];
    let statusColor = 'var(--green)', statusText = 'pünktl.';
    if (item.delay > 0 && item.delay < 5) { statusColor = 'var(--yellow)'; statusText = `+${item.delay} min`; }
    if (item.delay >= 5) { statusColor = 'var(--red)'; statusText = `+${item.delay} min`; }

    return `<div class="train-row" style="animation: fadeUp 0.35s ease ${i * 22}ms both">
      <div class="time">${item.time}</div>
      <div class="info">
        <div class="dest">${item.dest}</div>
        <div class="train-line">
          <span class="badge" style="background:${bs.bg};color:${bs.color}">${typeLabel}</span>
          <span class="train-name">${item.train}</span>
        </div>
      </div>
      <div class="status" style="color:${statusColor}">${statusText}</div>
      <div class="platform"><span>${item.plat}</span></div>
    </div>`;
  }).join('');

  const now = new Date().toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('footer-text').textContent = `Aktualisiert ${now} Uhr · ÖBB Österreich`;
}

// ─── UI controls ─────────────────────────────────────────
function setStation(key) {
  station = key;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + key).classList.add('active');
  render();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  document.getElementById('col-time').textContent = m === 'dep' ? 'ABFAHRT' : 'ANKUNFT';
  document.getElementById('col-dest').textContent = m === 'dep' ? 'ZIEL' : 'HERKUNFT';
  render();
}

// ─── Init + auto refresh ─────────────────────────────────
render();
setInterval(render, 60000);
</script>

</body>
</html>
