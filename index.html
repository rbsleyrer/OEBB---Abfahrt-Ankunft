<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Fahrplan</title>
<style>
body{margin:0;background:#09090f;color:#eef;font-family:monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#111;border-bottom:1px solid #222;}
#hdr b{font-size:17px;letter-spacing:1px;}
#hdr span{font-size:14px;color:#888;letter-spacing:2px;}
#modes{display:flex;gap:8px;padding:10px 16px;background:#0d0d14;border-bottom:1px solid #222;}
.mbtn{flex:1;padding:9px;background:#111;border:1px solid #333;border-radius:8px;color:#666;font-family:monospace;font-size:12px;cursor:pointer;}
.mbtn.on{background:rgba(232,0,61,0.15);border-color:rgba(232,0,61,0.5);color:#ff7090;}
#tabs{display:flex;background:#0d0d14;border-bottom:1px solid #222;}
.tbtn{flex:1;padding:12px;background:none;border:none;border-bottom:2px solid transparent;color:#555;font-family:monospace;font-size:12px;cursor:pointer;letter-spacing:1px;}
.tbtn.on{border-bottom-color:#e8003d;color:#eef;}
#cols{display:flex;padding:6px 16px;font-size:9px;letter-spacing:2px;color:#444;border-bottom:1px solid #222;text-transform:uppercase;}
#list{flex:1;overflow-y:auto;}
.row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.05);gap:12px;}
.t{font-size:19px;font-weight:bold;min-width:56px;color:#eef;}
.mid{flex:1;min-width:0;}
.dest{font-size:14px;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px;}
.sub{display:flex;align-items:center;gap:6px;}
.badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:bold;}
.tname{font-size:11px;color:#666;}
.st{font-size:12px;font-weight:bold;text-align:right;min-width:58px;}
.gl span{display:inline-flex;align-items:center;justify-content:center;background:#1a1a2e;border:1px solid #333;width:30px;height:26px;border-radius:5px;font-size:12px;}
#ftr{padding:7px 16px;font-size:10px;color:#333;border-top:1px solid #222;}
.dot{width:8px;height:8px;background:#e8003d;border-radius:50%;display:inline-block;margin-right:8px;animation:bl 1.4s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.1}}
</style>
</head>
<body>
<div id="hdr"><b><span class="dot"></span>OeBB FAHRPLAN</b><span id="clk">--:--:--</span></div>
<div id="modes">
  <button class="mbtn on" id="bdep" onclick="setMode('dep')">&#8593; ABFAHRT</button>
  <button class="mbtn" id="barr" onclick="setMode('arr')">&#8595; ANKUNFT</button>
</div>
<div id="tabs">
  <button class="tbtn on" id="tsbg" onclick="setStation('sbg')">Salzburg Hbf</button>
  <button class="tbtn" id="tvie" onclick="setStation('vie')">Wien Westbhf</button>
</div>
<div id="cols">
  <div style="min-width:56px" id="ctime">ABFAHRT</div>
  <div style="flex:1;padding-left:8px" id="cdest">ZIEL</div>
  <div style="min-width:58px;text-align:right">STATUS</div>
  <div style="width:30px;text-align:center;margin-left:12px">GL</div>
</div>
<div id="list"></div>
<div id="ftr">OeBB &amp; Westbahn</div>
<script>
var D={
 sbg:{
  dep:[
   ['Wien Westbahnhof','WB 110','wb','#ffd600','2'],
   ['Wien Hbf','RJ 160','rj','#ff6680','1'],
   ['Muenchen Hbf','RJ 61','rj','#ff6680','3'],
   ['Wien Westbahnhof','WB 112','wb','#ffd600','2'],
   ['Innsbruck Hbf','ICE 28','ice','#ccc','4'],
   ['Wien Hbf','RJ 162','rj','#ff6680','1'],
   ['Zuerich HB','EC 163','ic','#ff8844','5'],
   ['Wien Westbahnhof','WB 114','wb','#ffd600','2'],
   ['Graz Hbf','RJ 635','rj','#ff6680','1'],
   ['Budapest Keleti','RJ 63','rj','#ff6680','3'],
   ['Freilassing','S 1','s','#00e5a0','7'],
   ['Wien Westbahnhof','WB 116','wb','#ffd600','2'],
   ['Klagenfurt Hbf','EC 113','ic','#ff8844','4'],
   ['Wien Hbf','RJ 164','rj','#ff6680','1']
  ],
  arr:[
   ['Wien Westbahnhof','WB 111','wb','#ffd600','2'],
   ['Wien Hbf','RJ 161','rj','#ff6680','1'],
   ['Muenchen Hbf','RJ 60','rj','#ff6680','3'],
   ['Wien Westbahnhof','WB 113','wb','#ffd600','2'],
   ['Innsbruck Hbf','ICE 27','ice','#ccc','4'],
   ['Zuerich HB','EC 162','ic','#ff8844','5'],
   ['Wien Westbahnhof','WB 115','wb','#ffd600','2'],
   ['Frankfurt Hbf','ICE 26','ice','#ccc','4'],
   ['Graz Hbf','RJ 634','rj','#ff6680','1'],
   ['Budapest Keleti','RJ 62','rj','#ff6680','3'],
   ['Wien Westbahnhof','WB 117','wb','#ffd600','2'],
   ['Klagenfurt Hbf','EC 112','ic','#ff8844','4'],
   ['Praha hl.n.','RJ 74','rj','#ff6680','2'],
   ['Freilassing','S 1','s','#00e5a0','7']
  ]
 },
 vie:{
  dep:[
   ['Salzburg Hbf','WB 111','wb','#ffd600','4'],
   ['Salzburg Hbf','RJ 761','rj','#ff6680','6'],
   ['St. Poelten Hbf','S 50','s','#00e5a0','1'],
   ['Salzburg Hbf','WB 113','wb','#ffd600','4'],
   ['Innsbruck Hbf','RJ 163','rj','#ff6680','3'],
   ['Salzburg Hbf','RJ 763','rj','#ff6680','6'],
   ['Zuerich HB','RJ 165','rj','#ff6680','5'],
   ['Salzburg Hbf','WB 115','wb','#ffd600','4'],
   ['Muenchen Hbf','RJ 63','rj','#ff6680','6'],
   ['St. Poelten Hbf','S 50','s','#00e5a0','2'],
   ['Salzburg Hbf','WB 117','wb','#ffd600','4'],
   ['Bregenz','RJ 167','rj','#ff6680','3'],
   ['Salzburg Hbf','RJ 765','rj','#ff6680','6'],
   ['Feldkirch','IC 690','ic','#ff8844','5']
  ],
  arr:[
   ['Salzburg Hbf','WB 110','wb','#ffd600','4'],
   ['Salzburg Hbf','RJ 760','rj','#ff6680','6'],
   ['St. Poelten Hbf','S 50','s','#00e5a0','1'],
   ['Salzburg Hbf','WB 112','wb','#ffd600','4'],
   ['Muenchen Hbf','RJ 62','rj','#ff6680','6'],
   ['Innsbruck Hbf','RJ 162','rj','#ff6680','3'],
   ['Salzburg Hbf','WB 114','wb','#ffd600','4'],
   ['Zuerich HB','RJ 164','rj','#ff6680','5'],
   ['Salzburg Hbf','RJ 762','rj','#ff6680','6'],
   ['Bregenz','RJ 166','rj','#ff6680','3'],
   ['Salzburg Hbf','WB 116','wb','#ffd600','4'],
   ['Frankfurt Hbf','ICE 26','ice','#ccc','7'],
   ['Budapest Keleti','RJ 68','rj','#ff6680','5'],
   ['Praha hl.n.','RJ 74','rj','#ff6680','6']
  ]
 }
};

var st=‘sbg’, md=‘dep’;

function pad(n){return(n<10?‘0’:’’)+n;}
function tick(){var d=new Date();document.getElementById(‘clk’).textContent=pad(d.getHours())+’:’+pad(d.getMinutes())+’:’+pad(d.getSeconds());}
setInterval(tick,1000);tick();

function render(){
var rows=D[st][md];
var t=Date.now()+(1+Math.random()*2)*60000;
var h=’’;
for(var i=0;i<rows.length;i++){
if(i>0)t+=(4+Math.random()*9)*60000;
var r=rows[i];
var dl=Math.random()<0.16?Math.ceil(Math.random()*12):0;
var sc=’#00e5a0’,ss=‘punktl.’;
if(dl>0&&dl<5){sc=’#ffd600’;ss=’+’+dl+’ min’;}
if(dl>=5){sc=’#ff3d5a’;ss=’+’+dl+’ min’;}
var d=new Date(t);
var tm=pad(d.getHours())+’:’+pad(d.getMinutes());
var tl=r[2]===‘wb’?‘WB’:r[1].split(’ ‘)[0];
var bg=r[2]===‘wb’?‘rgba(255,214,0,0.15)’:r[2]===‘rj’?‘rgba(232,0,61,0.2)’:r[2]===‘ice’?‘rgba(255,255,255,0.1)’:r[2]===‘s’?‘rgba(0,229,160,0.15)’:‘rgba(255,107,53,0.2)’;
h+=’<div class="row">’;
h+=’<div class="t">’+tm+’</div>’;
h+=’<div class="mid"><div class="dest">’+r[0]+’</div>’;
h+=’<div class="sub"><span class="badge" style="background:'+bg+';color:'+r[3]+'">’+tl+’</span>’;
h+=’<span class="tname">’+r[1]+’</span></div></div>’;
h+=’<div class="st" style="color:'+sc+'">’+ss+’</div>’;
h+=’<div class="gl"><span>’+r[4]+’</span></div>’;
h+=’</div>’;
}
document.getElementById(‘list’).innerHTML=h;
var n=new Date();
document.getElementById(‘ftr’).textContent=pad(n.getHours())+’:’+pad(n.getMinutes())+’ - OeBB & Westbahn’;
}

function setStation(k){
st=k;
document.getElementById(‘tsbg’).className=‘tbtn’+(k==‘sbg’?’ on’:’’);
document.getElementById(‘tvie’).className=‘tbtn’+(k==‘vie’?’ on’:’’);
render();
}
function setMode(m){
md=m;
document.getElementById(‘bdep’).className=‘mbtn’+(m==‘dep’?’ on’:’’);
document.getElementById(‘barr’).className=‘mbtn’+(m==‘arr’?’ on’:’’);
document.getElementById(‘ctime’).textContent=m==‘dep’?‘ABFAHRT’:‘ANKUNFT’;
document.getElementById(‘cdest’).textContent=m==‘dep’?‘ZIEL’:‘HERKUNFT’;
render();
}
render();
setInterval(render,60000);
</script>

</body>
</html>
