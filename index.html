<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fahrplan">
<meta name="theme-color" content="#0a0a0f">
<title>Fahrplan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#f0f0f8;font-family:'DM Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px)}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;background:#111118;border-bottom:1px solid #1e1e2e;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;background:#e8003d;border-radius:50%;animation:blink 1.4s infinite}
.clk{font-size:14px;letter-spacing:2px;color:#5a5a7a}
.modes{display:flex;gap:8px;padding:10px 16px;background:#0d0d14;border-bottom:1px solid #1e1e2e;flex-shrink:0}
.mbtn{flex:1;padding:9px;background:rgba(255,255,255,0.03);border:1px solid #1e1e2e;border-radius:8px;color:#5a5a7a;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer}
.mbtn.on{background:rgba(232,0,61,0.15);border-color:rgba(232,0,61,0.4);color:#ff6680}
.tabs{display:flex;background:#0d0d14;border-bottom:1px solid #1e1e2e;flex-shrink:0}
.tab{flex:1;padding:12px 8px;background:none;border:none;border-bottom:2px solid transparent;color:#5a5a7a;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;cursor:pointer}
.tab.on{border-bottom-color:#e8003d;color:#f0f0f8}
.cols{display:flex;padding:6px 16px;font-size:9px;letter-spacing:2px;color:#5a5a7a;border-bottom:1px solid #1e1e2e;text-transform:uppercase;flex-shrink:0}
.list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid rgba(30,30,46,0.6);gap:12px}
.time{font-size:19px;font-weight:500;min-width:56px;color:#f0f0f8}
.mid{flex:1;min-width:0}
.dest{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.sub{display:flex;align-items:center;gap:6px}
.badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500}
.tname{font-size:11px;color:#5a5a7a}
.st{font-size:12px;font-weight:500;text-align:right;min-width:58px}
.gl span{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border:1px solid #1e1e2e;width:30px;height:26px;border-radius:5px;font-size:12px}
.ftr{padding:7px 16px;font-size:10px;color:#3a3a5a;border-top:1px solid #1e1e2e;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.12}}
</style>
</head>
<body>
<div id="app">
<div class="hdr">
  <div class="logo"><div class="dot"></div>OeBB FAHRPLAN</div>
  <div class="clk" id="clk">--:--:--</div>
</div>
<div class="modes">
  <button class="mbtn on" id="bdep" onclick="setMode('dep')">&#8593; ABFAHRT</button>
  <button class="mbtn" id="barr" onclick="setMode('arr')">&#8595; ANKUNFT</button>
</div>
<div class="tabs">
  <button class="tab on" id="tsbg" onclick="setStation('sbg')">Salzburg Hbf</button>
  <button class="tab" id="tvie" onclick="setStation('vie')">Wien Westbhf</button>
</div>
<div class="cols">
  <div style="min-width:56px" id="ctime">ABFAHRT</div>
  <div style="flex:1;padding-left:8px" id="cdest">ZIEL</div>
  <div style="min-width:58px;text-align:right">STATUS</div>
  <div style="width:30px;text-align:center;margin-left:12px">GL</div>
</div>
<div class="list" id="list"></div>
<div class="ftr" id="ftr">OeBB und Westbahn</div>
</div>
<script>
var BS={rj:{bg:'rgba(232,0,61,0.2)',c:'#ff6680'},ice:{bg:'rgba(255,255,255,0.1)',c:'#ddd'},ic:{bg:'rgba(255,107,53,0.2)',c:'#ff6b35'},s:{bg:'rgba(0,229,160,0.15)',c:'#00e5a0'},rex:{bg:'rgba(100,100,200,0.2)',c:'#9999dd'},wb:{bg:'rgba(255,214,0,0.18)',c:'#ffd600'}};
var D={sbg:{dep:[['Wien Westbahnhof','WB 110','wb','2'],['Wien Hbf','RJ 160','rj','1'],['Muenchen Hbf','RJ 61','rj','3'],['Wien Westbahnhof','WB 112','wb','2'],['Innsbruck Hbf','ICE 28','ice','4'],['Wien Hbf','RJ 162','rj','1'],['Zuerich HB','EC 163','ic','5'],['Wien Westbahnhof','WB 114','wb','2'],['Graz Hbf','RJ 635','rj','1'],['Budapest Keleti','RJ 63','rj','3'],['Freilassing','S 1','s','7'],['Wien Westbahnhof','WB 116','wb','2'],['Klagenfurt Hbf','EC 113','ic','4'],['Wien Hbf','RJ 164','rj','1']],arr:[['Wien Westbahnhof','WB 111','wb','2'],['Wien Hbf','RJ 161','rj','1'],['Muenchen Hbf','RJ 60','rj','3'],['Wien Westbahnhof','WB 113','wb','2'],['Innsbruck Hbf','ICE 27','ice','4'],['Zuerich HB','EC 162','ic','5'],['Wien Westbahnhof','WB 115','wb','2'],['Frankfurt Hbf','ICE 26','ice','4'],['Graz Hbf','RJ 634','rj','1'],['Budapest Keleti','RJ 62','rj','3'],['Wien Westbahnhof','WB 117','wb','2'],['Klagenfurt Hbf','EC 112','ic','4'],['Praha hl.n.','RJ 74','rj','2'],['Freilassing','S 1','s','7']]},vie:{dep:[['Salzburg Hbf','WB 111','wb','4'],['Salzburg Hbf','RJ 761','rj','6'],['St. Poelten Hbf','S 50','s','1'],['Salzburg Hbf','WB 113','wb','4'],['Innsbruck Hbf','RJ 163','rj','3'],['Salzburg Hbf','RJ 763','rj','6'],['Zuerich HB','RJ 165','rj','5'],['Salzburg Hbf','WB 115','wb','4'],['Muenchen Hbf','RJ 63','rj','6'],['St. Poelten Hbf','S 50','s','2'],['Salzburg Hbf','WB 117','wb','4'],['Bregenz','RJ 167','rj','3'],['Salzburg Hbf','RJ 765','rj','6'],['Feldkirch','IC 690','ic','5']],arr:[['Salzburg Hbf','WB 110','wb','4'],['Salzburg Hbf','RJ 760','rj','6'],['St. Poelten Hbf','S 50','s','1'],['Salzburg Hbf','WB 112','wb','4'],['Muenchen Hbf','RJ 62','rj','6'],['Innsbruck Hbf','RJ 162','rj','3'],['Salzburg Hbf','WB 114','wb','4'],['Zuerich HB','RJ 164','rj','5'],['Salzburg Hbf','RJ 762','rj','6'],['Bregenz','RJ 166','rj','3'],['Salzburg Hbf','WB 116','wb','4'],['Frankfurt Hbf','ICE 26','ice','7'],['Budapest Keleti','RJ 68','rj','5'],['Praha hl.n.','RJ 74','rj','6']]}};
var st='sbg',md='dep';
function pad(n){return n<10?'0'+n:''+n}
function tick(){var d=new Date();document.getElementById('clk').textContent=pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds())}
setInterval(tick,1000);tick();
function render(){
  var rows=D[st][md];
  var t=Date.now()+(1+Math.random()*2)*60000;
  var h='';
  for(var i=0;i<rows.length;i++){
    if(i>0)t+=(4+Math.random()*9)*60000;
    var r=rows[i];
    var bs=BS[r[2]]||BS.rex;
    var dl=Math.random()<0.16?Math.ceil(Math.random()*12):0;
    var sc='#00e5a0',ss='punktl.';
    if(dl>0&&dl<5){sc='#ffd600';ss='+'+dl+' min'}
    if(dl>=5){sc='#ff3d5a';ss='+'+dl+' min'}
    var d=new Date(t);
    var tm=pad(d.getHours())+':'+pad(d.getMinutes());
    var tl=r[2]==='wb'?'WB':r[1].split(' ')[0];
    h+='<div class="row">';
    h+='<div class="time">'+tm+'</div>';
    h+='<div class="mid"><div class="dest">'+r[0]+'</div>';
    h+='<div class="sub"><span class="badge" style="background:'+bs.bg+';color:'+bs.c+'">'+tl+'</span>';
    h+='<span class="tname">'+r[1]+'</span></div></div>';
    h+='<div class="st" style="color:'+sc+'">'+ss+'</div>';
    h+='<div class="gl"><span>'+r[3]+'</span></div>';
    h+='</div>';
  }
  document.getElementById('list').innerHTML=h;
  var n=new Date();
  document.getElementById('ftr').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+' Uhr - OeBB und Westbahn';
}
function setStation(k){
  st=k;
  document.getElementById('tsbg').className='tab'+(k=='sbg'?' on':'');
  document.getElementById('tvie').className='tab'+(k=='vie'?' on':'');
  render();
}
function setMode(m){
  md=m;
  document.getElementById('bdep').className='mbtn'+(m=='dep'?' on':'');
  document.getElementById('barr').className='mbtn'+(m=='arr'?' on':'');
  document.getElementById('ctime').textContent=m=='dep'?'ABFAHRT':'ANKUNFT';
  document.getElementById('cdest').textContent=m=='dep'?'ZIEL':'HERKUNFT';
  render();
}
render();
setInterval(render,60000);
</script>
</body>
</html>
